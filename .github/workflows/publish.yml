name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - run: pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check distributions
        run: |
          pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/airtelmoney-py/
    permissions:
      # Required for PyPI Trusted Publishing (OIDC). No API token needed if
      # you configure this repo as a trusted publisher on PyPI.
      id-token: write
    env:
      # Evaluate the secret once; `secrets` is usable in job-level env but not
      # reliably in step-level `if` conditions.
      HAS_TOKEN: ${{ secrets.PYPI_API_TOKEN != '' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Option A (recommended): Trusted Publishing via OIDC.
      # Configure at https://pypi.org/manage/project/airtelmoney-py/settings/publishing/
      - name: Publish via Trusted Publishing
        if: env.HAS_TOKEN != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      # Option B: API token fallback. Add a repository secret named
      # PYPI_API_TOKEN (value like "pypi-...") to use this path.
      - name: Publish via API token
        if: env.HAS_TOKEN == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
